<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLUB DICTIONARY | HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:#060608; --card:#0e0e12; --border:#1c1c26;
            --gold:#c8a84a; --white:#ede9e0; --muted:#82829a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--black); color:var(--white);
            font-family:'Noto Sans JP',sans-serif; max-width:430px; margin:0 auto;
            border-left:1px solid var(--border); border-right:1px solid var(--border);
            min-height:100vh; padding-bottom: 100px;
        }
        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-family:'Bebas Neue'; font-size:42px; letter-spacing:4px; color:var(--white); }
        .sub-logo { font-family:'DM Mono'; font-size:10px; color:var(--gold); letter-spacing:3px; }

        /* 店舗カード一覧 */
        .club-list { padding: 20px; display: grid; gap: 20px; }
        .club-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit;
            transition: transform 0.2s;
        }
        .club-card:active { transform: scale(0.98); }
        .card-img { width: 100%; height: 150px; background: #1a1a1a; object-fit: cover; filter: brightness(0.7); }
        .card-info { padding: 15px; }
        .card-rank { font-family:'DM Mono'; font-size:9px; color:var(--gold); margin-bottom: 5px; display: block; }
        .card-name { font-family:'Bebas Neue'; font-size:28px; letter-spacing:2px; line-height: 1; }
        .card-tags { font-family:'DM Mono'; font-size:8px; color:var(--muted); margin-top: 8px; }

        /* カテゴリ検索（ダミー） */
        .filter-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .filter-item {
            flex-shrink: 0; padding: 6px 15px; border: 1px solid var(--border);
            font-family:'DM Mono'; font-size:10px; border-radius: 20px; color: var(--muted);
        }
        .filter-item.active { border-color: var(--gold); color: var(--gold); background: rgba(200,168,74,0.1); }
    </style>
</head>
<body>

<header>
    <div class="logo">CLUB DICTIONARY</div>
    <div class="sub-logo">SELECTIVE ARCHIVE 2026</div>
</header>

<div class="filter-nav">
    <div class="filter-item active">ALL</div>
    <div class="filter-item">SHIBUYA</div>
    <div class="filter-item">ROPPONGI</div>
    <div class="filter-item">OSAKA</div>
    <div class="filter-item">TECHNO</div>
</div>

<div class="club-list">
    <a href="clubs/womb.html" class="club-card">
        <img src="https://images.unsplash.com/photo-1571266028243-d220c6a6f673?w=400" class="card-img">
        <div class="card-info">
            <span class="card-rank">RANKING #01</span>
            <div class="card-name">WOMB</div>
            <div class="card-tags">#SHIBUYA #TECHNO #4FLOORS</div>
        </div>
    </a>

    <a href="clubs/camelot.html" class="club-card">
        <div class="card-img" style="display:flex; align-items:center; justify-content:center; background:#111;">Coming Soon</div>
        <div class="card-info">
            <span class="card-rank">RANKING #02</span>
            <div class="card-name">CAMELOT</div>
            <div class="card-tags">#SHIBUYA #EDM #HIPHOP</div>
        </div>
    </a>
</div>

</body>
</html>
