<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLUB DICTIONARY | TOKYO & OSAKA</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --black:#060608; --card:#0e0e12; --border:#1c1c26; --gold:#c8a84a; --white:#ede9e0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--black); color:var(--white); font-family:sans-serif; max-width:430px; margin:0 auto; border:1px solid var(--border); min-height:100vh; }
        header { padding:50px 20px; text-align:center; border-bottom:1px solid var(--border); }
        .logo { font-family:'Bebas Neue'; font-size:48px; letter-spacing:5px; line-height:1; }
        .sub { font-family:'DM Mono'; font-size:9px; color:var(--gold); letter-spacing:3px; margin-top:10px; }
        .list { padding:10px 20px; }
        .item { display:flex; justify-content:space-between; align-items:center; padding:30px 0; border-bottom:1px solid var(--border); text-decoration:none; color:inherit; transition: 0.2s; }
        .item:active { opacity: 0.6; }
        .item-name { font-family:'Bebas Neue'; font-size:32px; letter-spacing:2px; line-height:1; }
        .item-area { font-family:'DM Mono'; font-size:10px; color:var(--gold); margin-top:5px; }
        .arrow { color:var(--border); font-size:20px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">CLUB DICTIONARY</div>
        <div class="sub">SELECTIVE ARCHIVE 2026</div>
    </header>
    <div class="list">
        <a href="clubs/womb.html" class="item">
            <div>
                <div class="item-name">WOMB</div>
                <div class="item-area">SHIBUYA / TECHNO</div>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="clubs/lion.html" class="item">
            <div>
                <div class="item-name">不眠遊戯ライオン</div>
                <div class="item-area">SHIBUYA / MUSIC BAR</div>
            </div>
            <div class="arrow">→</div>
        </a>
        <a href="clubs/ru.html" class="item">
            <div>
                <div class="item-name">CLUB RU</div>
                <div class="item-area">OSAKA / ALLMIX</div>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>
</body>
</html>
