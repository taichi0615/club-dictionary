<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>不眠遊戯ライオン | CLUB DICTIONARY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:#060608; --card:#0e0e12; --border:#1c1c26;
            --accent:#e03c3c; /* ライオンを象徴するレッド */
            --white:#ede9e0; --muted:#82829a;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:var(--black); color:var(--white);
            font-family:'Noto Sans JP',sans-serif; max-width:430px; margin:0 auto;
            border-left:1px solid var(--border); border-right:1px solid var(--border);
            min-height:100vh; padding-bottom: 80px;
        }

        .sticky-nav {
            position:fixed; top:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:430px; z-index:1000;
            background:rgba(6,6,8,.94); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between; padding:13px 18px;
        }
        .back-link { font-family:'DM Mono'; font-size:10px; color:var(--muted); text-decoration:none; letter-spacing:2px; }

        .hero-media {
            width:100%; aspect-ratio:9/16; margin-top:52px; background:#111; position:relative; overflow: hidden;
        }
        .hero-media video { width:100%; height:100%; object-fit:cover; filter:brightness(0.7); }
        .hero-bottom { position:absolute; bottom:20px; left:18px; right:18px; pointer-events:none; z-index: 100; }
        .hero-name { font-family:'Bebas Neue'; font-size:42px; letter-spacing:4px; line-height:1; text-shadow: 0 0 15px rgba(224,60,60,0.4); }

        .sec { padding:25px 18px; background: var(--black); }
        .sec-lbl { font-family:'DM Mono'; font-size:8px; letter-spacing:3.5px; color:var(--accent); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .sec-lbl::before { content:''; width:16px; height:1px; background:var(--accent); }

        .event-box { border: 1px solid var(--border); background: var(--card); padding: 15px; border-radius: 2px; }
        .event-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
        .event-item:last-child { border-bottom: none; }
        .event-date { font-family: 'DM Mono'; font-size: 9px; color: var(--accent); margin-bottom: 4px; }
        .event-ttl { font-size: 13px; font-weight: bold; letter-spacing: 1px; }

        .info-table { width:100%; border-collapse:collapse; }
        .info-table td { padding:15px 0; border-bottom:1px solid var(--border); font-size:11px; }
        .info-lbl { font-family:'DM Mono'; color:var(--accent); width:90px; font-size:8px; letter-spacing:2px; }

        .btn-insta { display:block; width:100%; padding:14px; text-align:center; border:1px solid #E1306C; color:#E1306C; text-decoration:none; font-family:'DM Mono'; font-size:10px; font-weight:bold; margin-top:20px; }
    </style>
</head>
<body>

<div class="sticky-nav">
    <a href="../index.html" class="back-link">← BACK TO LIST</a>
</div>

<div class="hero-media">
    <video 
        src="../LCMF9iuQswiOI6AYY9KLpNuDum62Cp_pll3qyOhMX0Y.MP4" 
        autoplay 
        muted 
        loop 
        playsinline>
    </video>
    <div class="hero-bottom">
        <div class="hero-name">不眠遊戯ライオン</div>
    </div>
</div>

<div class="sec">
    <div class="sec-lbl">UPCOMING EVENTS</div>
    <div class="event-box">
        <div class="event-item"><div class="event-date">MAR 12 [THU]</div><div class="event-ttl">WTW</div></div>
        <div class="event-item"><div class="event-date">MAR 13 [FRI]</div><div class="event-ttl">REPRISE</div></div>
        <div class="event-item"><div class="event-date">MAR 14 [SAT]</div><div class="event-ttl">KULU 7TH ANNIVERSARY</div></div>
    </div>
    <a href="https://www.instagram.com/music_bar_lion/" class="btn-insta" target="_blank">OFFICIAL INSTAGRAM</a>
</div>

<div class="sec">
    <div class="sec-lbl">ESSENTIAL INFO</div>
    <table class="info-table">
        <tr><td class="info-lbl">AREA</td><td>SHIBUYA / JINGUMAE</td></tr>
        <tr><td class="info-lbl">GENRE</td><td>HOUSE / TECHNO / DISCO</td></tr>
        <tr><td class="info-lbl">ADDRESS</td><td>東京都渋谷区神宮前6-19-17 GEMS神宮前 7F</td></tr>
        <tr><td class="info-lbl">VIBE</td><td>CULTURAL MUSIC BAR</td></tr>
    </table>
</div>

</body>
</html>
