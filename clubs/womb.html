<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOMB | CLUB DICTIONARY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:#060608; --card:#0e0e12; --border:#1c1c26;
            --gold:#c8a84a; --white:#ede9e0; --muted:#82829a;
            --tiktok:#25F4EE; --insta:#E1306C;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:var(--black); color:var(--white);
            font-family:'Noto Sans JP',sans-serif; max-width:430px; margin:0 auto;
            border-left:1px solid var(--border); border-right:1px solid var(--border);
            min-height:100vh; padding-bottom: 60px;
        }

        /* HEADER */
        .sticky-nav {
            position:fixed; top:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:430px; z-index:100;
            background:rgba(6,6,8,.94); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between; padding:13px 18px;
        }
        .back-link { font-family:'DM Mono'; font-size:10px; color:var(--muted); text-decoration:none; letter-spacing:2px; }

        /* HERO VIDEO */
        .hero-media {
            width:100%; aspect-ratio:9/16; margin-top:52px; background:#000; position:relative;
        }
        .hero-media iframe { width:100%; height:100%; border:none; }
        .hero-bottom { position:absolute; bottom:20px; left:18px; right:18px; pointer-events:none; }
        .hero-name { font-family:'Bebas Neue'; font-size:52px; letter-spacing:4px; line-height:1; }

        /* SECTION */
        .sec { padding:25px 18px; }
        .sec-lbl { font-family:'DM Mono'; font-size:8px; letter-spacing:3.5px; color:var(--gold); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .sec-lbl::before { content:''; width:16px; height:1px; background:var(--gold); }
        
        .desc-text { font-size:13px; line-height:1.8; color:var(--muted); }

        /* INFO TABLE */
        .info-table { width:100%; border-collapse:collapse; }
        .info-table td { padding:15px 0; border-bottom:1px solid var(--border); font-size:12px; vertical-align:top; }
        .info-lbl { font-family:'DM Mono'; color:var(--gold); width:90px; font-size:8px; letter-spacing:2px; padding-top:4px; }

        /* SNS BUTTONS */
        .sns-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
        .btn {
            display:block; padding:14px; text-align:center; border-radius:2px;
            text-decoration:none; font-family:'DM Mono'; font-size:10px; letter-spacing:2px; font-weight:bold;
        }
        .btn-insta { border:1px solid var(--insta); color:var(--insta); }
        .btn-tiktok { border:1px solid var(--tiktok); color:var(--tiktok); }
    </style>
</head>
<body>

<div class="sticky-nav">
    <a href="../index.html" class="back-link">← BACK TO LIST</a>
</div>

<div class="hero-media">
    <iframe src="https://www.tiktok.com/embed/v2/7279316447953259777"></iframe>
    <div class="hero-bottom">
        <div class="hero-name">WOMB</div>
    </div>
</div>

<div class="sec">
    <div class="sec-lbl">ABOUT</div>
    <div class="desc-text">
        動画で紹介した通り、アジア最大級のミラーボールと世界基準の音響を誇る渋谷のアイコン。
    </div>
    
    <div class="sns-btns">
        <a href="INSTA_URL" class="btn btn-insta">INSTAGRAM</a>
        <a href="TIKTOK_URL" class="btn btn-tiktok">TIKTOK</a>
    </div>
</div>

<div class="sec">
    <div class="sec-lbl">ESSENTIAL INFO</div>
    <table class="info-table">
        <tr><td class="info-lbl">AREA</td><td>SHIBUYA</td></tr>
        <tr><td class="info-lbl">GENRE</td><td>TECHNO / HOUSE</td></tr>
        <tr><td class="info-lbl">ADDRESS</td><td>東京都渋谷区円山町2-16</td></tr>
        <tr><td class="info-lbl">SYSTEM</td><td>MEN ¥3,500 / WOMEN ¥1,500</td></tr>
    </table>
</div>

</body>
</html>
